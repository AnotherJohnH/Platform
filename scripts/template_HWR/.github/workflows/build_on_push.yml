name: build_on_push

on: [push]

env:
  BUILD_TYPE: Release

jobs:

  #---------------------------------------------------------------------
  # Linux CI

  build_Linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [rp2040, rp2350, native]

    steps:
    - uses: actions/checkout@v6
      with:
       submodules: 'recursive'

    - name: Install dependencies
      run: |
           sudo apt-get update
           sudo apt-get install -y libsdl2-dev
           sudo apt-get install -y gcc-arm-none-eabi

    - name: Prepare build
      run: mkdir -p ${{github.workspace}}/build/${{matrix.target}}

    - name: Configure CMake
      shell: bash
      working-directory: ${{github.workspace}}/build/${{matrix.target}}
      run: |
        export SDL2_DIR=${{github.workspace}}/.github/workflows
        cmake ../.. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=PDK/TGT/${{matrix.target}}/toolchain.cmake -DBUILD_TESTING=ON

    - name: Build
      working-directory: ${{github.workspace}}/build/${{matrix.target}}
      shell: bash
      run: make

    - name: Test
      working-directory: ${{github.workspace}}/build/${{matrix.target}}
      shell: bash
      run: ctest -V -C $BUILD_TYPE

    - uses: actions/upload-artifact@v7
      with:
        name: BINARY_Linux_${{matrix.target}}
        path: |
          ${{github.workspace}}/build/${{matrix.target}}/*.uf2
          ${{github.workspace}}/build/${{matrix.target}}/*.hex
          ${{github.workspace}}/build/${{matrix.target}}/*.bin
          ${{github.workspace}}/build/${{matrix.target}}/*_NATIVE

  #---------------------------------------------------------------------
  # macOS CI

  build_macOS:
    runs-on: macOS-latest
    strategy:
      fail-fast: false
      matrix:
        target: [rp2040, rp2350, native]

    steps:
    - uses: actions/checkout@v6
      with:
       submodules: 'recursive'

    - name: Install dependencies
      run: |
        brew install arm-none-eabi-gcc
        brew install SDL2

    - name: Prepare build
      run: mkdir -p ${{github.workspace}}/build/${{matrix.target}}

    - name: Configure build
      working-directory: ${{github.workspace}}/build/${{matrix.target}}
      shell: bash
      run: |
         cmake ../.. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=PDK/TGT/${{matrix.target}}/toolchain.cmake -DBUILD_TESTING=ON

    - name: Build
      working-directory: ${{github.workspace}}/build/${{matrix.target}}
      shell: bash
      run: make

    - name: Test
      working-directory: ${{github.workspace}}/build/${{matrix.target}}
      shell: bash
      run: ctest -V -C $BUILD_TYPE

    - uses: actions/upload-artifact@v7
      with:
        name: BINARY_macOS_${{matrix.target}}
        path: |
          ${{github.workspace}}/build/${{matrix.target}}/*.uf2
          ${{github.workspace}}/build/${{matrix.target}}/*.hex
          ${{github.workspace}}/build/${{matrix.target}}/*.bin
          ${{github.workspace}}/build/${{matrix.target}}/*_NATIVE
